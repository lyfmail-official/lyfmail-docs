name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Build static site
        run: |
          # Create a simple index page from README if index.html doesn't exist
          if [ ! -f index.html ]; then
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>LYF Mail Docs</title><meta http-equiv="refresh" content="0; url=https://docs.lyfmail.com"></head><body><p>Redirecting to <a href="https://docs.lyfmail.com">docs.lyfmail.com</a>...</p></body></html>' > index.html
          fi
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
